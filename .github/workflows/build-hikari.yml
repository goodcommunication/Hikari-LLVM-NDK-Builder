name: Build Hikari LLVM19 (Windows)

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ '.github/workflows/build-hikari.yml' ]

jobs:
  build-hikari:
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - name: Checkout LLVM 19.1.0
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: llvmorg-19.1.0
          path: llvm-project

      - name: Merge Hikari Patch
        shell: cmd
        run: |
          git clone https://github.com/Aethereux/Hikari-LLVM19.git hikari-patch
          xcopy /E /Y /I hikari-patch\clang llvm-project\clang
          xcopy /E /Y /I hikari-patch\llvm llvm-project\llvm
          # 强制删除 amdgpu-arch 目录，彻底避开冲突
          rmdir /S /Q "llvm-project\clang\tools\amdgpu-arch"
          # 验证删除结果
          dir "llvm-project\clang\tools\"
          if not exist "llvm-project\llvm\lib\Transforms\Obfuscation" (
            echo "❌ Hikari patch merge failed! Obfuscation directory not found."
            exit 1
          )
          echo "✅ Hikari patch merged successfully!"

      - name: Setup MSVC Build Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake and Ninja
        shell: cmd
        run: |
          choco install cmake ninja -y --no-progress
          echo "CMAKE_ROOT=C:\Program Files\CMake" >> %GITHUB_ENV%
          echo "NINJA_ROOT=C:\ProgramData\chocolatey\bin" >> %GITHUB_ENV%
          refreshenv
          cmake --version
          ninja --version

      - name: Configure LLVM with CMake (Windows X86 Only)
        shell: cmd
        working-directory: llvm-project
        run: |
          if not exist "build" mkdir build
          cd build
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
            -DCMAKE_CXX_FLAGS="/MT" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_TARGETS_TO_BUILD="X86" ^
            -DLLVM_ENABLE_ZSTD=OFF ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_UTILS=OFF ^
            -DLLVM_INCLUDE_BENCHMARKS=OFF ^
            -DLLVM_BUILD_TOOLS=OFF ^
            -DLLVM_BUILD_PLUGINS=ON ^
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
            ..\llvm

      - name: Build Obfuscation Plugin (Verbose Log)
        shell: cmd
        working-directory: llvm-project/build
        run: |
          ninja Obfuscation -v > ninja-build.log 2>&1
          type ninja-build.log
          dir /s /b lib\*
          if exist "lib\Transforms\Obfuscation\Obfuscation.lib" (
            echo "✅ Hikari plugin built successfully!"
            dir lib\Transforms\Obfuscation\Obfuscation.lib
            exit 0
          ) else (
            echo "❌ Hikari plugin build failed! Obfuscation.lib not found."
            exit 1
          )

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hikari-llvm19-plugin
          path: llvm-project/build/lib/Transforms/Obfuscation/
          retention-days: 7
          
      - name: Upload Build Log (For Debug)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ninja-build-log
          path: llvm-project/build/ninja-build.log
          retention-days: 7
