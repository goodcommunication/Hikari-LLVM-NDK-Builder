name: Build Hikari-LLVM19 for Android NDK r28 (Windows)

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'Android NDK Version (适配r28)'
        required: true
        default: 'r28'
      llvm_version:
        description: 'LLVM Version'
        required: true
        default: '19.1.0'
        type: choice
        options:
          - '19.1.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      # 步骤1：拉取官方llvm-project（LLVM 19.1.0）
      - name: Checkout LLVM official repo
        run: |
          git clone --config core.autocrlf=false https://github.com/llvm/llvm-project.git
          cd llvm-project
          git checkout llvmorg-${{ github.event.inputs.llvm_version }}
          dir # 验证目录结构
        shell: cmd

      # 步骤2：拉取TinyTime-Joy/hikari-llvm19并合并源码
      - name: Checkout Hikari-LLVM19 (Windows适配版)
        run: |
          git clone https://github.com/TinyTime-Joy/hikari-llvm19.git hikari-patch
          :: 覆盖合并llvm和clang文件夹到官方LLVM仓库
          xcopy /E /Y hikari-patch\llvm llvm-project\llvm\
          xcopy /E /Y hikari-patch\clang llvm-project\clang\
          echo 源码合并完成
        shell: cmd

      # 步骤3：配置MSVC环境（自动适配GitHub的VS路径）
      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      # 步骤4：安装依赖（cmake/ninja）
      - name: Install dependencies
        run: |
          choco install cmake ninja -y
          cmake --version
          ninja --version
        shell: cmd

      # 步骤5：编译（适配项目的build.cmd逻辑，自动生成编译脚本）
      - name: Build Hikari-LLVM19 (Windows)
        run: |
          cd llvm-project
          :: 生成适配GitHub环境的build.cmd（自动用当前MSVC路径）
          echo @echo off > build.cmd
          echo call "%%VSINSTALLDIR%%\BuildTools\bin\Hostx64\x64\vcvars64.bat" >> build.cmd
          echo mkdir build 2>nul >> build.cmd
          echo cd build >> build.cmd
          echo cmake -G Ninja ^
          echo   -DCMAKE_BUILD_TYPE=Release ^
          echo   -DCMAKE_CXX_STANDARD=17 ^
          echo   -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;X86" ^
          echo   -DLLVM_ENABLE_PROJECTS="clang" ^
          echo   -DLLVM_INCLUDE_TESTS=OFF ^
          echo   -DLLVM_INCLUDE_EXAMPLES=OFF ^
          echo   -DLLVM_INCLUDE_DOCS=OFF ^
          echo   ..\llvm >> build.cmd
          echo ninja -j2 >> build.cmd
          :: 执行编译
          call build.cmd
        shell: cmd

      # 步骤6：下载Android NDK r28（Windows版本）
      - name: Download Android NDK r28
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-windows.zip" -OutFile "ndk.zip"
          Expand-Archive -Path "ndk.zip" -DestinationPath "."
        shell: powershell

      # 步骤7：替换NDK的bin/lib目录（按项目说明）
      - name: Integrate Hikari into NDK r28
        run: |
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          $llvmPath = "$ndkPath/toolchains/llvm/prebuilt/windows-x86_64"
          
          # 备份原始文件
          Copy-Item -Path "$llvmPath/bin" -Destination "$llvmPath/bin_original" -Recurse -Force
          Copy-Item -Path "$llvmPath/lib" -Destination "$llvmPath/lib_original" -Recurse -Force
          
          # 复制编译产物（覆盖NDK）
          Copy-Item -Path "llvm-project/build/bin/*" -Destination "$llvmPath/bin/" -Recurse -Force
          Copy-Item -Path "llvm-project/build/lib/*" -Destination "$llvmPath/lib/" -Recurse -Force
          
          # 打包成品
          Compress-Archive -Path $ndkPath -DestinationPath "hikari-llvm19-ndk${{ github.event.inputs.ndk_version }}-windows.zip"
        shell: powershell

      # 步骤8：上传产物+创建Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-llvm19-ndk${{ github.event.inputs.ndk_version }}-windows
          path: hikari-*.zip
          retention-days: 30

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: hikari-llvm19-ndk${{ github.event.inputs.ndk_version }}
          name: Hikari-LLVM19 Android NDK ${{ github.event.inputs.ndk_version }} (Windows)
          files: hikari-*.zip
          body: |
            ## Hikari-LLVM19 for Android NDK ${{ github.event.inputs.ndk_version }} (Windows)
            基于 TinyTime-Joy/hikari-llvm19 编译，适配Windows环境
            ### 混淆参数
            - -mllvm -enable-allobf（全部启用）
            - -mllvm -enable-bcfobf（虚假控制流）
            - -mllvm -enable-cffobf（控制流平坦化）
            - -mllvm -enable-splitobf（基本块分割）
            - -mllvm -enable-subobf（指令替换）
            - -mllvm -enable-indibran（间接跳转）
            - -mllvm -enable-strcry（字符串加密）
            - -mllvm -enable-funcwra（函数封装）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
