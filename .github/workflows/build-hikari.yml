name: Build Hikari-LLVM19 (Plugin Mode) for Android NDK r28

# 确保手动触发入口存在（核心：保留 workflow_dispatch）
on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'Android NDK Version'
        required: true
        default: 'r28'
      llvm_version:
        description: 'LLVM Version'
        required: true
        default: '19.1.0'
        type: choice
        options:
          - '19.1.0'
  # 可选：保留 push 触发，方便测试；若不想自动触发，可删除下一行
  push:
    paths:
      - '.github/workflows/build-hikari.yml'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: cmd

    steps:
      # 步骤1：拉取官方 LLVM 源码（修复目录校验）
      - name: Checkout LLVM official repo
        run: |
          git clone --config core.autocrlf=false https://github.com/llvm/llvm-project.git
          cd llvm-project
          git checkout -q llvmorg-${{ github.event.inputs.llvm_version }}
          if exist "llvm/CMakeLists.txt" (
            echo LLVM source directory verified.
          ) else (
            echo Error: LLVM CMakeLists.txt not found!
            exit 1
          )

      # 步骤2：拉取 Hikari 补丁并合并
      - name: Checkout Hikari-LLVM19
        run: |
          git clone https://github.com/TinyTime-Joy/hikari-llvm19.git hikari-patch
          xcopy /E /Y hikari-patch\llvm\* llvm-project\llvm\
          xcopy /E /Y hikari-patch\clang\* llvm-project\clang\
          echo Hikari patch merged successfully.

      # 步骤3：生成插件模式 CMakeLists.txt（修复 cmd 换行语法）
      - name: Generate Plugin CMakeLists.txt
        run: |
          :: 用逐行写入替代变量，避免 cmd 换行转义错误
          echo add_llvm_pass_plugin(Obfuscation) > llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   Obfuscation.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   BogusControlFlow.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   ControlFlowFlattening.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   StringEncryption.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   Substitute.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   Utils.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   SplitBasicBlocks.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   IndirectBranch.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   FunctionWrapper.cpp >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo ^) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo. >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo target_link_libraries(Obfuscation PRIVATE) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   LLVMIRReader >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   LLVMCore >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   LLVMSupport >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   LLVMTransformUtils >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   LLVMAnalysis >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo ^) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo. >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo if (WIN32) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   set_target_properties(Obfuscation PROPERTIES) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo     LINK_FLAGS "/DELAYLOAD:llvm-c.dll" >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo     SUFFIX ".dll" >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo   ^) >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          echo endif() >> llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          :: 验证文件
          if exist "llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt" (
            echo CMakeLists.txt generated successfully.
          ) else (
            exit 1
          )

      # 步骤4：配置 MSVC 环境
      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      # 步骤5：安装依赖
      - name: Install Dependencies
        run: |
          choco install cmake ninja -y --no-progress
          cmake --version
          ninja --version

      # 步骤6：配置 LLVM 编译
      - name: Configure LLVM
        run: |
          cd llvm-project
          mkdir build 2>nul
          cd build
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=17 ^
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;X86" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            ..\llvm

      # 步骤7：仅编译混淆插件（核心，避免链接错误）
      - name: Build Obfuscation Plugin
        run: |
          cd llvm-project\build
          ninja Obfuscation
          if exist "lib\Obfuscation.dll" (
            echo Plugin built: lib\Obfuscation.dll
          ) else (
            dir lib\
            exit 1
          )

      # 步骤8：下载 NDK（改用 PowerShell，避免 cmd 下载问题）
      - name: Download Android NDK
        shell: powershell
        run: |
          $url = "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile "ndk.zip" -UseBasicParsing
          Expand-Archive -Path "ndk.zip" -DestinationPath "." -Force

      # 步骤9：复制插件到 NDK
      - name: Copy Plugin to NDK
        shell: powershell
        run: |
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          $pluginSrc = "llvm-project/build/lib/Obfuscation.dll"
          $pluginDst = "$ndkPath/toolchains/llvm/prebuilt/windows-x86_64/bin/"
          New-Item -Path $pluginDst -ItemType Directory -Force | Out-Null
          Copy-Item -Path $pluginSrc -Destination $pluginDst -Force
          if (Test-Path "$pluginDst/Obfuscation.dll") {
            Write-Host "Plugin copied to NDK successfully."
          } else {
            exit 1
          }

      # 步骤10：上传产物（暂移除 SO 编译，先确保插件编译成功）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-llvm19-plugin-ndk-r28
          path: |
            android-ndk-${{ github.event.inputs.ndk_version }}
            llvm-project/build/lib/Obfuscation.dll
          retention-days: 30
