name: Build Hikari-LLVM19 (Plugin Mode) for Android NDK r28

# 保留手动触发入口，确保Run workflow按钮存在
on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'Android NDK Version'
        required: true
        default: 'r28'
      llvm_version:
        description: 'LLVM Version'
        required: true
        default: '19.1.0'
        type: choice
        options:
          - '19.1.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: cmd # 统一使用cmd，避免shell混合错误

    steps:
      # 步骤1：拉取LLVM官方源码并校验
      - name: Checkout LLVM Official Repository
        run: |
          echo "Cloning LLVM project (version: ${{ github.event.inputs.llvm_version }})"
          git clone --config core.autocrlf=false https://github.com/llvm/llvm-project.git
          cd llvm-project
          git checkout -q llvmorg-${{ github.event.inputs.llvm_version }}
          
          # 校验核心文件是否存在
          if not exist "llvm/CMakeLists.txt" (
            echo "ERROR: LLVM core CMakeLists.txt not found!"
            exit 1
          )
          echo "LLVM source code checkout completed."

      # 步骤2：拉取Hikari补丁并合并
      - name: Checkout and Merge Hikari Patch
        run: |
          echo "Cloning Hikari-LLVM19 patch"
          git clone https://github.com/TinyTime-Joy/hikari-llvm19.git hikari-patch
          
          # 合并补丁到LLVM/Clang目录
          xcopy /E /Y /I hikari-patch\llvm\* llvm-project\llvm\
          xcopy /E /Y /I hikari-patch\clang\* llvm-project\clang\
          
          # 校验混淆Pass目录是否存在
          if not exist "llvm-project\llvm\lib\Transforms\Obfuscation" (
            echo "ERROR: Hikari Obfuscation directory not found!"
            exit 1
          )
          echo "Hikari patch merged successfully."

      # 步骤3：生成正确语法的插件模式CMakeLists.txt（核心修复）
      - name: Generate Obfuscation Plugin CMakeLists.txt
        run: |
          echo "Generating CMakeLists.txt for Obfuscation Plugin"
          set CMAKE_FILE_PATH=llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          
          # 清空原有文件并写入正确语法的配置
          echo add_llvm_pass_plugin(Obfuscation ^
            Obfuscation.cpp ^
            BogusControlFlow.cpp ^
            ControlFlowFlattening.cpp ^
            StringEncryption.cpp ^
            Substitute.cpp ^
            Utils.cpp ^
            SplitBasicBlocks.cpp ^
            IndirectBranch.cpp ^
            FunctionWrapper.cpp ^
          ) > %CMAKE_FILE_PATH%
          
          echo. >> %CMAKE_FILE_PATH%
          echo target_link_libraries(Obfuscation ^
            PRIVATE ^
            LLVMIRReader ^
            LLVMCore ^
            LLVMSupport ^
            LLVMTransformUtils ^
            LLVMAnalysis ^
          ) >> %CMAKE_FILE_PATH%
          
          echo. >> %CMAKE_FILE_PATH%
          echo if (WIN32) ^
            set_target_properties(Obfuscation PROPERTIES ^
              LINK_FLAGS "/DELAYLOAD:llvm-c.dll" ^
              SUFFIX ".dll" ^
            ) ^
          endif() >> %CMAKE_FILE_PATH%
          
          # 打印生成的文件内容（方便调试）
          echo "Generated CMakeLists.txt content:"
          type %CMAKE_FILE_PATH%
          
          # 校验文件生成
          if not exist %CMAKE_FILE_PATH% (
            echo "ERROR: CMakeLists.txt generation failed!"
            exit 1
          )
          echo "Obfuscation Plugin CMakeLists.txt generated successfully."

      # 步骤4：配置MSVC编译环境
      - name: Setup MSVC Development Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 步骤5：安装CMake和Ninja构建工具
      - name: Install Build Dependencies
        run: |
          echo "Installing CMake and Ninja"
          choco install cmake ninja -y --no-progress --force
          
          # 校验工具安装
          cmake --version
          ninja --version
          if errorlevel 1 (
            echo "ERROR: CMake/Ninja installation failed!"
            exit 1
          )
          echo "Dependencies installed successfully."

      # 步骤6：配置LLVM编译参数（仅编译必要模块）
      - name: Configure LLVM Build
        run: |
          echo "Configuring LLVM with CMake"
          cd llvm-project
          mkdir build 2>nul
          cd build
          
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=17 ^
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;X86" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_BUILD_PLUGINS=ON ^
            ..\llvm
          
          if errorlevel 1 (
            echo "ERROR: LLVM CMake configuration failed!"
            exit 1
          )
          echo "LLVM configuration completed."

      # 步骤7：仅编译Obfuscation插件（避免链接错误）
      - name: Build Obfuscation Plugin Only
        run: |
          echo "Building Obfuscation Plugin"
          cd llvm-project\build
          
          # 仅编译插件，大幅缩短时间
          ninja Obfuscation
          
          # 校验插件生成
          if not exist "lib\Obfuscation.dll" (
            echo "ERROR: Obfuscation.dll build failed!"
            dir lib\
            exit 1
          )
          echo "Obfuscation Plugin built successfully: lib\Obfuscation.dll"

      # 步骤8：下载Android NDK r28
      - name: Download Android NDK r28
        shell: powershell
        run: |
          Write-Host "Downloading Android NDK ${{ github.event.inputs.ndk_version }}"
          $ndkUrl = "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-windows.zip"
          $ndkZip = "ndk.zip"
          
          # 下载NDK（启用断点续传）
          Invoke-WebRequest -Uri $ndkUrl -OutFile $ndkZip -UseBasicParsing -Resume
          
          # 解压NDK
          Expand-Archive -Path $ndkZip -DestinationPath "." -Force
          
          # 校验NDK目录
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          if (-not (Test-Path "$ndkPath/toolchains/llvm")) {
            Write-Error "ERROR: NDK LLVM toolchain not found!"
            exit 1
          }
          Write-Host "NDK downloaded and extracted successfully."

      # 步骤9：复制Obfuscation插件到NDK目录
      - name: Copy Plugin to NDK
        shell: powershell
        run: |
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          $pluginSrc = "llvm-project/build/lib/Obfuscation.dll"
          $pluginDst = "$ndkPath/toolchains/llvm/prebuilt/windows-x86_64/bin/"
          
          # 创建目标目录
          New-Item -Path $pluginDst -ItemType Directory -Force | Out-Null
          
          # 复制插件
          Copy-Item -Path $pluginSrc -Destination $pluginDst -Force
          
          # 校验复制结果
          if (-not (Test-Path "$pluginDst/Obfuscation.dll")) {
            Write-Error "ERROR: Plugin copy to NDK failed!"
            exit 1
          }
          Write-Host "Obfuscation Plugin copied to NDK: $pluginDst"

      # 步骤10：打包并上传产物
      - name: Package and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hikari-llvm19-plugin-ndk-r28-windows
          path: |
            android-ndk-${{ github.event.inputs.ndk_version }}/**/*
            llvm-project/build/lib/Obfuscation.dll
          retention-days: 30
          if-no-files-found: error
