name: Build Hikari-LLVM19 (Plugin Mode) for Android NDK r28

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'Android NDK Version'
        required: true
        default: 'r28'
      llvm_version:
        description: 'LLVM Version'
        required: true
        default: '19.1.0'
        type: choice
        options:
          - '19.1.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout LLVM Official Repository
        run: |
          :: 克隆LLVM官方源码
          git clone --config core.autocrlf=false https://github.com/llvm/llvm-project.git
          cd llvm-project
          git checkout -q llvmorg-${{ github.event.inputs.llvm_version }}
          
          :: 校验核心文件
          if not exist "llvm/CMakeLists.txt" (
            echo ERROR: LLVM CMakeLists.txt not found!
            exit 1
          )
          echo LLVM source code checkout completed.

      - name: Checkout and Merge Hikari Patch
        run: |
          :: 克隆Hikari补丁
          git clone https://github.com/TinyTime-Joy/hikari-llvm19.git hikari-patch
          
          :: 合并补丁到LLVM/Clang
          xcopy /E /Y /I hikari-patch\llvm\* llvm-project\llvm\
          xcopy /E /Y /I hikari-patch\clang\* llvm-project\clang\
          
          :: 校验混淆目录
          if not exist "llvm-project\llvm\lib\Transforms\Obfuscation" (
            echo ERROR: Hikari Obfuscation directory not found!
            exit 1
          )
          echo Hikari patch merged successfully.

      - name: Generate Plugin CMakeLists.txt
        run: |
          :: 定义CMake文件路径
          set CMAKE_FILE=llvm-project\llvm\lib\Transforms\Obfuscation\CMakeLists.txt
          
          :: 写入插件配置（无#注释，纯cmd语法）
          echo add_llvm_pass_plugin(Obfuscation ^
            Obfuscation.cpp ^
            BogusControlFlow.cpp ^
            ControlFlowFlattening.cpp ^
            StringEncryption.cpp ^
            Substitute.cpp ^
            Utils.cpp ^
            SplitBasicBlocks.cpp ^
            IndirectBranch.cpp ^
            FunctionWrapper.cpp ^
          ) > %CMAKE_FILE%
          
          echo. >> %CMAKE_FILE%
          echo target_link_libraries(Obfuscation ^
            PRIVATE ^
            LLVMIRReader ^
            LLVMCore ^
            LLVMSupport ^
            LLVMTransformUtils ^
            LLVMAnalysis ^
          ) >> %CMAKE_FILE%
          
          echo. >> %CMAKE_FILE%
          echo if (WIN32) ^
            set_target_properties(Obfuscation PROPERTIES ^
              LINK_FLAGS "/DELAYLOAD:llvm-c.dll" ^
              SUFFIX ".dll" ^
            ) ^
          endif() >> %CMAKE_FILE%
          
          :: 校验文件
          if not exist %CMAKE_FILE% (
            exit 1
          )
          echo CMakeLists.txt generated successfully.

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Dependencies
        run: |
          :: 安装CMake和Ninja
          choco install cmake ninja -y --no-progress
          cmake --version
          ninja --version
          if errorlevel 1 exit 1
          echo Dependencies installed.

      - name: Configure LLVM Build
        run: |
          cd llvm-project
          mkdir build 2>nul
          cd build
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=17 ^
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;X86" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_BUILD_PLUGINS=ON ^
            ..\llvm
          if errorlevel 1 exit 1
          echo LLVM configured.

      - name: Build Obfuscation Plugin
        run: |
          cd llvm-project\build
          ninja Obfuscation
          if not exist "lib\Obfuscation.dll" (
            dir lib\
            exit 1
          )
          echo Obfuscation.dll built successfully.

      - name: Download Android NDK
        shell: powershell
        run: |
          $url = "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile "ndk.zip" -UseBasicParsing
          Expand-Archive -Path "ndk.zip" -DestinationPath "." -Force
          if (-not (Test-Path "android-ndk-${{ github.event.inputs.ndk_version }}")) {
            exit 1
          }

      - name: Copy Plugin to NDK
        shell: powershell
        run: |
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          $pluginDst = "$ndkPath/toolchains/llvm/prebuilt/windows-x86_64/bin/"
          New-Item -Path $pluginDst -ItemType Directory -Force | Out-Null
          Copy-Item -Path "llvm-project/build/lib/Obfuscation.dll" -Destination $pluginDst -Force
          if (-not (Test-Path "$pluginDst/Obfuscation.dll")) {
            exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hikari-llvm19-plugin-ndk-r28
          path: |
            android-ndk-${{ github.event.inputs.ndk_version }}
            llvm-project/build/lib/Obfuscation.dll
          retention-days: 30
