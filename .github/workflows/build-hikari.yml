name: Minimal Hikari Plugin Build (Debug Only)

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM Version'
        required: true
        default: '19.1.0'
        type: choice
        options:
          - '19.1.0'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout LLVM
        run: |
          git clone --config core.autocrlf=false https://github.com/llvm/llvm-project.git
          cd llvm-project
          git checkout -q llvmorg-${{ github.event.inputs.llvm_version }}
          if not exist "llvm/CMakeLists.txt" exit 1
          echo LLVM checkout done.

      - name: Merge Hikari Patch
        run: |
          git clone https://github.com/TinyTime-Joy/hikari-llvm19.git hikari-patch
          xcopy /E /Y /I hikari-patch\llvm\* llvm-project\llvm\
          xcopy /E /Y /I hikari-patch\clang\* llvm-project\clang\
          if not exist "llvm-project\llvm\lib\Transforms\Obfuscation" exit 1
          echo Hikari patch merged.

      - name: Generate CMakeLists.txt (PowerShell)
        shell: powershell
        run: |
          $c = @"
add_llvm_pass_plugin(Obfuscation
  Obfuscation.cpp
  BogusControlFlow.cpp
  ControlFlowFlattening.cpp
  StringEncryption.cpp
  Substitute.cpp
  Utils.cpp
  SplitBasicBlocks.cpp
  IndirectBranch.cpp
  FunctionWrapper.cpp
)

target_link_libraries(Obfuscation
  PRIVATE
  LLVMIRReader
  LLVMCore
  LLVMSupport
  LLVMTransformUtils
  LLVMAnalysis
)
"@
          $p = "llvm-project/llvm/lib/Transforms/Obfuscation/CMakeLists.txt"
          Set-Content -Path $p -Value $c -Encoding UTF8
          if (-not (Test-Path $p)) { exit 1 }
          Get-Content $p

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake/Ninja
        run: |
          choco install cmake ninja -y --no-progress
          cmake --version
          ninja --version

      - name: Configure LLVM (Minimal)
        run: |
          cd llvm-project
          mkdir build 2>nul
          cd build
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_STANDARD=17 ^
            -DLLVM_TARGETS_TO_BUILD="X86" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_BUILD_PLUGINS=ON ^
            ..\llvm
          if errorlevel 1 exit 1
          echo LLVM configure passed!

      # 先不编译插件，先确保CMake能过
