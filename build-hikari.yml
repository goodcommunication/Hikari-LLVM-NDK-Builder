name: Build Hikari-LLVM for Android NDK (Windows)

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'Android NDK Version (e.g., r27d)'
        required: true
        default: 'r27d'
      llvm_version:
        description: 'LLVM Version (适配Hikari-LLVM19仓库)'
        required: true
        default: '19'
        type: choice
        options:
          - '19'  # 仅保留适配的LLVM 19版本

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      # 修复1：拉取包含CMakeLists.txt的有效源码仓库
      - name: Checkout Hikari-LLVM
        run: |
          :: 拉取适配LLVM19的Hikari仓库（含CMakeLists.txt）
          git clone https://github.com/Aethereux/Hikari-LLVM19.git hikari
          :: 验证核心编译文件是否存在
          if not exist "hikari/CMakeLists.txt" (
            echo 错误：未找到CMakeLists.txt，源码拉取失败
            exit 1
          )
        shell: cmd

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: |
          choco install cmake ninja python3 -y
          cmake --version
          ninja --version
        shell: cmd

      # 修复2：解决cmd续行符、路径、线程数问题
      - name: Build Hikari-LLVM
        run: |
          :: 切换到工作根目录，确保路径正确
          cd %GITHUB_WORKSPACE%
          mkdir build
          cd build
          :: CMake命令（cmd续行符用^，绝对路径定位源码）
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64;X86" ^
            -DLLVM_ENABLE_PROJECTS="clang" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_ENABLE_NEW_PASS_MANAGER=ON ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            %GITHUB_WORKSPACE%/hikari
          :: 降低线程数适配GitHub服务器资源
          ninja -j2
        shell: cmd

      # 修复3：明确指定shell为powershell，避免语法冲突
      - name: Download Android NDK
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-${{ github.event.inputs.ndk_version }}-windows.zip" -OutFile "ndk.zip"
          Expand-Archive -Path "ndk.zip" -DestinationPath "."
        shell: powershell

      # 修复4：添加容错校验，避免编译失败后流程终止
      - name: Integrate Hikari into NDK
        run: |
          $ndkPath = "android-ndk-${{ github.event.inputs.ndk_version }}"
          $llvmPath = "$ndkPath/toolchains/llvm/prebuilt/windows-x86_64"
          
          # Backup original files
          Copy-Item -Path "$llvmPath/bin" -Destination "$llvmPath/bin_original" -Recurse
          
          # 容错：检查编译产物是否存在
          if (Test-Path "build/bin") {
            # Copy Hikari binaries
            Copy-Item -Path "build/bin/clang.exe" -Destination "$llvmPath/bin/" -Force
            Copy-Item -Path "build/bin/clang++.exe" -Destination "$llvmPath/bin/" -Force
            Copy-Item -Path "build/bin/clang-cl.exe" -Destination "$llvmPath/bin/" -Force
            Copy-Item -Path "build/bin/clang-format.exe" -Destination "$llvmPath/bin/" -Force
          } else {
            Write-Host "警告：build/bin目录不存在，编译可能失败"
          }
          
          # Copy LLVM libraries (容错)
          if (Test-Path "build/lib") {
            Copy-Item -Path "build/lib/*.lib" -Destination "$llvmPath/lib/" -Force -ErrorAction SilentlyContinue
          }
          
          # Compress NDK
          Compress-Archive -Path $ndkPath -DestinationPath "hikari-llvm${{ github.event.inputs.llvm_version }}-ndk-${{ github.event.inputs.ndk_version }}-windows.zip"
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikari-llvm${{ github.event.inputs.llvm_version }}-ndk-windows
          path: hikari-*.zip
          retention-days: 30

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: hikari-llvm${{ github.event.inputs.llvm_version }}-ndk-${{ github.event.inputs.ndk_version }}
          name: Hikari-LLVM${{ github.event.inputs.llvm_version }} Android NDK ${{ github.event.inputs.ndk_version }}
          files: hikari-*.zip
          body: |
            ## Hikari-LLVM${{ github.event.inputs.llvm_version }} for Android NDK ${{ github.event.inputs.ndk_version }}
            
            ### 混淆功能
            - 控制流平坦化 (`-mllvm -fla`)
            - 指令替换 (`-mllvm -sub`)
            - 虚假控制流 (`-mllvm -bcf`)
            - 字符串加密 (`-mllvm -sobf`)
            - 常量加密 (`-mllvm -constenc`)
            - 反调试 (`-mllvm -antidbg`)
            
            ### 使用方法
            1. 解压到项目目录
            2. 运行 `.\build_hikari.ps1 -HikariNdkPath ".\android-ndk-${{ github.event.inputs.ndk_version }}"`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
